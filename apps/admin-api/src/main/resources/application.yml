spring:
  application:
    name: admin-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ragops_dev}
    username: ${DATABASE_USERNAME:ragops_user}
    password: ${DATABASE_PASSWORD:ragops_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration
      - classpath:com/publicplatform/ragops/adminapi/migration

  main:
    web-application-type: servlet

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key}
      chat:
        enabled: ${OPENAI_ENABLED:false}
        options:
          model: gpt-5-latest
          temperature: 0.3
    ollama:
      base-url: ${OLLAMA_URL:http://jcg-office.tailedf4dc.ts.net:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:qwen2.5:7b}
        options:
          temperature: 0.3
          num-predict: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  shutdown: graceful
  port: 8081

rag:
  orchestrator:
    enabled: true
    url: http://localhost:8090

spring-ai:
  answer:
    enabled: true
    provider: ollama

evaluation:
  ragas:
    enabled: ${RAGAS_EVAL_ENABLED:true}
    judge-provider: ${RAGAS_JUDGE_PROVIDER:ollama}
    ollama-url: ${OLLAMA_URL:http://jcg-office.tailedf4dc.ts.net:11434}
    ollama-model: ${RAGAS_OLLAMA_MODEL:qwen2.5:7b}
  llm-judge:
    enabled: ${LLM_JUDGE_ENABLED:false}
    provider: ${JUDGE_PROVIDER:ollama}
