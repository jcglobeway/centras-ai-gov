spring:
  application:
    name: admin-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ragops_dev}
    username: ${DATABASE_USERNAME:ragops_user}
    password: ${DATABASE_PASSWORD:ragops_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration
      - classpath:com/publicplatform/ragops/adminapi/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  main:
    web-application-type: servlet

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  shutdown: graceful
  port: 8081

rag:
  orchestrator:
    enabled: true
    url: http://localhost:8090

ragas:
  eval:
    redis:
      enabled: ${RAGAS_EVAL_REDIS_ENABLED:true}

evaluation:
  ragas:
    enabled: ${RAGAS_EVAL_ENABLED:true}
    judge-provider: ${RAGAS_JUDGE_PROVIDER:ollama}
    ollama-url: ${OLLAMA_URL:http://jcg-office.tailedf4dc.ts.net:11434}
    ollama-model: ${RAGAS_OLLAMA_MODEL:qwen2.5:7b}
  llm-judge:
    enabled: ${LLM_JUDGE_ENABLED:false}
    provider: ${JUDGE_PROVIDER:ollama}

metrics:
  aggregation:
    cron: "0 */30 * * * *"
