spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration
      - classpath:com/publicplatform/ragops/adminapi/migration
    target: "54"

  ai:
    ollama:
      chat:
        enabled: false
    openai:
      api-key: test-key

spring-ai:
  answer:
    enabled: false
    provider: none

rag:
  orchestrator:
    enabled: false

ragas:
  eval:
    redis:
      enabled: false
