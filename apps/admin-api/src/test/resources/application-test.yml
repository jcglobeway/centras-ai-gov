spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration
      - classpath:com/publicplatform/ragops/adminapi/migration
    target: "42"

  ai:
    ollama:
      chat:
        enabled: false
    openai:
      api-key: test-key

spring-ai:
  answer:
    enabled: false
    provider: none

rag:
  orchestrator:
    enabled: false

ragas:
  eval:
    redis:
      enabled: false
