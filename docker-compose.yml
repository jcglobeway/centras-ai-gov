services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ragops-postgres
    environment:
      POSTGRES_DB: ragops_dev
      POSTGRES_USER: ragops_user
      POSTGRES_PASSWORD: ragops_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragops_user -d ragops_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
